
services:
  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  db:
    image: postgres:13-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
      - db
    env_file:
      - ./bot/.env
    volumes:
      - ./bot:/bot
    working_dir: /bot
    environment:
      - PYTHONPATH=/bot
    command: python main.py

volumes:
  redis_data:
  postgres_data:
